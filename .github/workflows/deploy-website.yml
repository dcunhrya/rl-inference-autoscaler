# Build website/ and publish to the gh-pages branch.
# YOU MUST enable Pages once in repo Settings (see GITHUB_PAGES_SETUP.md).

name: Deploy website to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'website/**'
      - 'results/**'
      - '.github/workflows/deploy-website.yml'
      - 'GITHUB_PAGES_SETUP.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install and build
        working-directory: website
        env:
          SITE_URL: https://dcunhrya.github.io
          BASE_PATH: /rl-inference-autoscaler/
        run: |
          npm ci
          npm run build

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: website/dist
          publish_branch: gh-pages
          force_orphan: true

      - name: Remind — enable Pages in Settings if the site 404s
        run: |
          echo "::notice title=GitHub Pages::If https://dcunhrya.github.io/rl-inference-autoscaler/ returns 404, enable Pages: Settings → Pages → Deploy from branch → gh-pages → / (root). See GITHUB_PAGES_SETUP.md"
